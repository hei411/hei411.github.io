# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.


title: Heili is Me
email: hei411@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
 Business as usual
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://hei411.github.io" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  hei411
linkedin_username: heili

# remote_theme: HongMinYang/jekyll-bear-theme


# Build settings
plugins:
  - jekyll-redirect-from

whitelist:
  - jekyll-redirect-from

markdown: kramdown

compress_html:
  clippings: all
  comments: [""]
  endings: [html, head, body, li, dt, dd, rt, rp, optgroup, option, colgroup, caption, thead, tbody, tfoot, tr, td, th]
  profile: false
  blanklines: false
  ignore:
    envs: []

# sass:
#   sass_dir: css
#   style:    compressed

collections:
  my_tags:
    output: true
    permalink: /tagged/:slug/
defaults:
  -
    scope:
      path: ""
      type: my_tags
    values:
      layout: tagged

# baseurl: ""
permalink: /tagged/:slug/
timezone: America/New_York
future: false

exclude:
- README.md
- LICENSE.md

exclude: [vendor]

#Blog: /blog
#Life: /life

# Add general links to site pages here
links:
  About: about/
  

# Add links for more focus here
special_links:
  "Github": https://github.com/hei411
  "Linkedin": https://linkedin.com/in/heili
# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
